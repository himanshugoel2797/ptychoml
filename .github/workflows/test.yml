name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [ci-py312, ci-py313]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          environments: ${{ matrix.environment }}
          locked: false

      - name: Run tests
        run: pixi run -e ${{ matrix.environment }} test
